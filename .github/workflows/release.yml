name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.2.0). Leave blank for a manual draft."
        required: false

permissions:
  contents: write

jobs:
  # One macos-14 (arm64) runner produces both arm64 and x64 bundles.
  # build-app.js --arch=x64 downloads the x64 Electron release zip, so
  # we don't need a separate macos-13 runner — those are unreliably
  # slow to allocate from GitHub's pool, often queueing 25+ minutes.
  build:
    name: Build (arm64 + x64)
    runs-on: macos-14
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Pier.app (arm64)
        run: npm run build:app -- --arch=arm64

      - name: Zip Pier-arm64.zip
        run: |
          chmod +x dist/Pier.app/Contents/MacOS/Electron
          ditto -c -k --keepParent dist/Pier.app dist/Pier-arm64.zip

      - name: Build Pier.app (x64, cross-built from arm64)
        run: npm run build:app -- --arch=x64

      - name: Zip Pier-x64.zip
        run: |
          chmod +x dist/Pier.app/Contents/MacOS/Electron
          ditto -c -k --keepParent dist/Pier.app dist/Pier-x64.zip

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: pier-arm64
          path: dist/Pier-arm64.zip
          if-no-files-found: error

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: pier-x64
          path: dist/Pier-x64.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          cp artifacts/pier-arm64/Pier-arm64.zip release/
          cp artifacts/pier-x64/Pier-x64.zip   release/
          ls -la release

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "ref=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update GitHub Release
        if: steps.tag.outputs.ref != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          name: ${{ steps.tag.outputs.ref }}
          generate_release_notes: true
          files: release/*.zip
          fail_on_unmatched_files: true
